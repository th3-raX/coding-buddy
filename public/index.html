<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Review Assistant — AI-Powered Code Reviews</title>
  <meta name="description"
    content="Get instant AI-powered code reviews. Paste your code and receive 3 actionable improvements plus a positive note." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link id="prism-theme" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
      {
        "imports": {
          "codemirror": "https://esm.sh/codemirror@6.0.1?external=@codemirror/state,@codemirror/view,@codemirror/commands,@codemirror/language,@codemirror/lint,@codemirror/search,@codemirror/autocomplete",
          "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6.30.0?external=@codemirror/state",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.6.1?external=@codemirror/state,@codemirror/view",
          "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.2?external=@codemirror/state,@codemirror/view",
          "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.6?external=@codemirror/state,@codemirror/view",
          "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.0?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.1?external=@codemirror/state,@codemirror/view",
          "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.2?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.1.6?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lang-css": "https://esm.sh/@codemirror/lang-css@6.2.1?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lang-html": "https://esm.sh/@codemirror/lang-html@6.4.9?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2?external=@codemirror/state,@codemirror/view"
        }
      }
    </script>
</head>

<body>
  <header class="header" id="header">
    <div class="header-left">
      <span class="header-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
          <path d="M5 3v4" />
          <path d="M19 17v4" />
          <path d="M3 5h4" />
          <path d="M17 19h4" />
        </svg></span>
      <div class="header-title-container">
        <h1 class="header-title">Rk's Coding Buddy</h1>
        <h3 class="header-subtitle">AI-Powered Code Reviews</h3>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
        <!-- Sun icon (visible in dark mode typically, meaning "switch to light") -->
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon -->
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <button class="btn-icon" id="history-toggle" aria-label="Toggle review history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      </button>
    </div>
  </header>

  <main class="main" id="main">
    <section class="editor-section" id="editor-section">
      <div class="editor-header">
        <div class="editor-controls">
          <select class="language-select" id="language-select" aria-label="Select programming language">
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="jsx">React / JSX</option>
            <option value="python">Python</option>
            <option value="css">CSS</option>
            <option value="html">HTML</option>
            <option value="sql">SQL</option>
          </select>
          <span class="line-count" id="line-count">0 lines</span>
        </div>
        <button class="btn-clear-editor" id="clear-btn" disabled aria-label="Clear editor">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          <span>Clear</span>
        </button>
      </div>
      <div class="editor-container" id="editor-container">
        <div class="editor-placeholder" id="editor-placeholder" aria-hidden="true">
          <div class="editor-placeholder-line" style="width:55%"></div>
          <div class="editor-placeholder-line" style="width:75%"></div>
          <div class="editor-placeholder-line" style="width:40%"></div>
          <div class="editor-placeholder-line" style="width:65%"></div>
          <div class="editor-placeholder-line" style="width:30%"></div>
        </div>
      </div>
      <div class="editor-footer">
        <span class="editor-hint">Paste up to 200 lines of code</span>
        <button class="btn-review" id="review-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 12l2 2 4-4" />
            <circle cx="12" cy="12" r="10" />
          </svg>
          <span class="btn-spinner" aria-hidden="true"></span>
          <span id="review-btn-text">Review Code</span>
        </button>
      </div>
    </section>

    <section class="results-section hidden" id="results-section">
      <div class="results-header">
        <h2 class="results-title">Review Results</h2>
        <button class="btn-copy" id="copy-btn" aria-label="Copy review as markdown">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" />
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
          </svg>
          <span>Copy</span>
        </button>
      </div>
      <div class="results-cards" id="results-cards"></div>
    </section>

    <section class="loading-section hidden" id="loading-section">
      <div class="loading-card skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line medium"></div>
      </div>
      <div class="loading-card skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-code"></div>
      </div>
      <div class="loading-card skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-code"></div>
      </div>
      <div class="loading-card skeleton">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-code"></div>
      </div>
    </section>

    <div class="error-message hidden" id="error-message">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      <span id="error-text"></span>
    </div>
  </main>

  <aside class="sidebar hidden" id="history-sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        Review History
      </h2>
      <button class="btn-icon" id="history-close" aria-label="Close history">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div class="sidebar-content" id="history-list"></div>
    <div class="sidebar-footer">
      <button class="btn-clear" id="clear-history-btn">
        Clear All History
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>
  <div class="toast-container" id="toast-container"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-jsx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
  <script type="module" src="app.js"></script>
</body>

</html>
